<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wolf Daniels Maktub — Contenido</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --gold: #F5C518;
    --white: #f5f5f0;
    --gray: #141414;
    --gray2: #1e1e1e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 4rem);
    color: var(--gold);
    letter-spacing: 0.08em;
    text-align: center;
  }
  p {
    color: #888;
    font-size: 1rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-align: center;
  }
  .cards {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 1rem;
  }
  .card {
    background: var(--gray2);
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 2rem 2.5rem;
    text-decoration: none;
    color: var(--white);
    transition: border-color 0.2s, transform 0.2s;
    min-width: 240px;
    text-align: center;
  }
  .card:hover {
    border-color: var(--gold);
    transform: translateY(-4px);
  }
  .card-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
  }
  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--gold);
    letter-spacing: 0.06em;
    margin-bottom: 0.4rem;
  }
  .card-desc {
    font-size: 0.85rem;
    color: #888;
  }
</style>
</head>
<body>
  <div>
    <h1>Wolf Daniels Maktub</h1>
    <p>Portal de contenido mensual</p>
  </div>
  <div class="cards">
    <a class="card" href="guiones_wolf_daniels.html">
      <div class="card-icon">🎬</div>
      <div class="card-title">Guiones de Contenido</div>
      <div class="card-desc">Scripts y guiones para redes sociales</div>
    </a>
    <a class="card" href="selector_linea_visual_wolf.html">
      <div class="card-icon">🎨</div>
      <div class="card-title">Línea Visual</div>
      <div class="card-desc">Selector de identidad visual</div>
    </a>
  </div>
</body>
</html>
